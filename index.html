<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Daily To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <button id="mobileMenuBtn" class="mobile-only">☰</button>
        <h1>To-Do List</h1>
    </div>
    <div class="header-actions">
        <button id="themeBtnHeader">🎨 Themes</button>
        <button id="exportBtn">Export Data</button>
        <input type="file" id="importFile" accept=".json" class="hidden">
        <button id="importBtn">Import Data</button>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="mobile-only" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2>Menu</h2>
            <button id="closeSidebarBtn" style="background:transparent; border:none; font-size:1.5rem; padding: 5px;">✕</button>
        </div>
        <div>
            <h3>Lists / Projects</h3>
            <div id="listsContainer" class="lists-container" style="margin-top: 10px;"></div>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="text" id="newListInput" placeholder="New List Name" style="flex:1; width:100%;">
                <button id="addListBtn">+</button>
            </div>
        </div>

        <div>
            <h3>Statistics</h3>
            <div class="stats" id="statsContainer" style="margin-top: 10px;"></div>
        </div>

        <div>
            <h3>Views</h3>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                <button id="viewActiveBtn" style="font-weight: bold;">Active Tasks</button>
                <button id="viewCompletedBtn">Completed Tasks</button>
                <button id="viewArchiveBtn">Archived Tasks</button>
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button id="clearCompletedBtn">Clear Completed</button>
            <button id="clearAllBtn" style="color: var(--danger); border-color: var(--danger);">Clear All Tasks</button>
        </div>
        
        <div class="mobile-only" style="display:flex; flex-direction:column; gap:10px; margin-top: 15px;">
            <hr style="border-color: var(--border-color);">
            <button id="themeBtnSidebar">🎨 Themes</button>
            <button onclick="document.getElementById('exportBtn').click()">Export Data</button>
            <button onclick="document.getElementById('importBtn').click()">Import Data</button>
        </div>
    </div>

    <div class="main">
        <div class="task-form" id="taskForm">
            <input type="text" id="taskText" placeholder="What needs to be done?" required autofocus style="flex: 1 1 100%;">
            <textarea id="taskDetails" placeholder="Task Details / Notes (Optional, Markdown supported)" style="flex: 1 1 100%; min-height: 60px; font-family: inherit;"></textarea>
            <select id="taskPriority" title="Priority">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
            </select>
            <input type="text" id="taskCategory" placeholder="Category (e.g. Work)" style="width: 140px;">
            <div class="due-date-wrapper" style="display:flex; align-items:center; gap:5px;" title="Due Date">
                <span style="font-size:0.8em; color:gray;">Due:</span>
                <input type="datetime-local" id="taskDueDate">
            </div>
            <div class="reminder-wrapper" style="display:flex; align-items:center; gap:5px;" title="Remind me in X days/hours">
                <span style="font-size:0.8em; color:gray;">Reminder in:</span>
                <input type="number" id="taskReminderDays" placeholder="Days" min="0" style="width: 65px;">
                <span style="font-size:0.8em; color:gray;">d</span>
                <input type="number" id="taskReminderHours" placeholder="Hrs" min="0" style="width: 65px;">
                <span style="font-size:0.8em; color:gray;">h</span>
            </div>
            <select id="taskRecurring" title="Recurring">
                <option value="None">No Repeat</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
            </select>
            <button id="addTaskBtn" style="background-color: var(--success); color: #fff; font-weight:bold;">Add Task</button>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search tasks by keyword...">
            <select id="filterPriority">
                <option value="All">All Priorities</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <select id="sortOptions">
                <option value="default">Sort: Default (Drag & Drop)</option>
                <option value="alpha">Alphabetical</option>
                <option value="dueDate">Due Date</option>
                <option value="priority">Priority</option>
            </select>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal hidden">
    <div class="modal-content">
        <h3>Edit Task</h3>
        <input type="text" id="editTaskText" placeholder="Task description">
        <textarea id="editTaskNotes" placeholder="Task Details (Markdown supported: **bold**, *italic*, [link](url))..."></textarea>
        
        <div class="modal-row">
            <select id="editTaskPriority">
                <option value="Low">Low Priority</option>
                <option value="Medium">Medium Priority</option>
                <option value="High">High Priority</option>
            </select>
            <input type="text" id="editTaskCategory" placeholder="Category">
        </div>
        
        <div class="modal-row">
            <div class="due-date-wrapper" style="display:flex; align-items:center; gap:5px;" title="Due Date">
                <span style="font-size:0.8em; color:gray;">Due:</span>
                <input type="datetime-local" id="editTaskDueDate" style="flex:1;">
            </div>
            <div class="reminder-wrapper" style="display:flex; align-items:center; gap:5px;" title="Remind me in X days/hours">
                <span style="font-size:0.8em; color:gray;">Reminder in:</span>
                <input type="number" id="editTaskReminderDays" placeholder="Days" min="0" style="width: 60px;">
                <span style="font-size:0.8em; color:gray;">d</span>
                <input type="number" id="editTaskReminderHours" placeholder="Hrs" min="0" style="width: 60px;">
                <span style="font-size:0.8em; color:gray;">h</span>
            </div>
            <select id="editTaskRecurring">
                <option value="None">No Repeat</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
            </select>
        </div>
        
        <hr style="border-color: var(--border-color); margin: 10px 0;">
        
        <h4>Subtasks</h4>
        <ul id="editSubtaskList" class="subtasks" style="margin-left: 0;"></ul>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="newSubtaskText" placeholder="New Subtask step" style="flex:1;">
            <button id="addSubtaskBtn">Add</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end;">
            <button id="cancelEditBtn">Cancel</button>
            <button id="saveEditBtn" style="background-color: var(--success); color: #fff;">Save Changes</button>
        </div>
    </div>
</div>


<!-- Theme Modal -->
<div id="themeModal" class="modal hidden">
    <div class="modal-content" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Select Theme</h3>
            <button id="closeThemeModalBtn" style="background:transparent; border:none; font-size:1.5rem; padding:0; box-shadow:none;">✕</button>
        </div>
        <div style="margin-bottom: 15px; margin-top: 10px;">
            <button id="modalDarkModeToggle" style="width: 100%; font-weight: bold;">🌙 Toggle Dark Mode</button>
        </div>
        <h4>Light Backgrounds (20 Colors)</h4>
        <div id="colorPalette" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 10px; margin-top: 10px;">
            <!-- Color circles generated by JS -->
        </div>
    </div>
</div>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
