<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Daily To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>To-Do List</h1>
    <div class="header-actions">
        <button id="themeToggle">Toggle Dark Mode</button>
        <button id="exportBtn">Export Data</button>
        <input type="file" id="importFile" accept=".json" class="hidden">
        <button id="importBtn">Import Data</button>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <div>
            <h3>Pomodoro Timer</h3>
            <div style="font-size: 2rem; text-align: center; font-weight: bold; margin: 10px 0; font-family: monospace;" id="pomodoroDisplay">25:00</div>
            <div style="display: flex; gap: 5px;">
                <button id="pomodoroStartBtn" style="flex: 1; background-color: var(--success); color: white;">Start</button>
                <button id="pomodoroPauseBtn" style="flex: 1; background-color: var(--warning); color: white;" class="hidden">Pause</button>
                <button id="pomodoroResetBtn" style="flex: 1;">Reset</button>
            </div>
            <select id="pomodoroMode" style="width: 100%; margin-top: 5px;">
                <option value="25">25 min Work</option>
                <option value="5">5 min Break</option>
            </select>
        </div>

        <hr style="border-color: var(--border-color); margin: 10px 0;">

        <div>
            <h3>Lists / Projects</h3>
            <div id="listsContainer" class="lists-container" style="margin-top: 10px;"></div>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="text" id="newListInput" placeholder="New List Name" style="flex:1; width:100%;">
                <button id="addListBtn">+</button>
            </div>
        </div>

        <div>
            <h3>Statistics</h3>
            <div class="stats" id="statsContainer" style="margin-top: 10px;"></div>
        </div>

        <div>
            <h3>Views</h3>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                <button id="viewActiveBtn" style="font-weight: bold;">Active Tasks</button>
                <button id="viewCompletedBtn">Completed Tasks</button>
                <button id="viewArchiveBtn">Archived Tasks</button>
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button id="clearCompletedBtn">Clear Completed</button>
            <button id="clearAllBtn" style="color: var(--danger); border-color: var(--danger);">Clear All Tasks</button>
        </div>
    </div>

    <div class="main">
        <div class="task-form" id="taskForm">
            <input type="text" id="taskText" placeholder="What needs to be done?" required autofocus style="flex: 1 1 100%;">
            <textarea id="taskDetails" placeholder="Task Details / Notes (Optional, Markdown supported)" style="flex: 1 1 100%; min-height: 60px; font-family: inherit;"></textarea>
            <select id="taskPriority" title="Priority">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
            </select>
            <input type="text" id="taskCategory" placeholder="Category (e.g. Work)" style="width: 140px;">
            <div style="display:flex; align-items:center; gap:5px;" title="Due Date">
                <span style="font-size:0.8em; color:gray;">Due:</span>
                <input type="datetime-local" id="taskDueDate">
            </div>
            <div style="display:flex; align-items:center; gap:5px;" title="Optional Reminder Notification">
                <span style="font-size:0.8em; color:gray;">Reminder:</span>
                <input type="datetime-local" id="taskReminderDate">
            </div>
            <select id="taskRecurring" title="Recurring">
                <option value="None">No Repeat</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
            </select>
            <button id="addTaskBtn" style="background-color: var(--success); color: #fff; font-weight:bold;">Add Task</button>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search tasks by keyword...">
            <select id="filterPriority">
                <option value="All">All Priorities</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <select id="sortOptions">
                <option value="default">Sort: Default (Drag & Drop)</option>
                <option value="alpha">Alphabetical</option>
                <option value="dueDate">Due Date</option>
                <option value="priority">Priority</option>
            </select>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal hidden">
    <div class="modal-content">
        <h3>Edit Task</h3>
        <input type="text" id="editTaskText" placeholder="Task description">
        <textarea id="editTaskNotes" placeholder="Task Details (Markdown supported: **bold**, *italic*, [link](url))..."></textarea>
        
        <div class="modal-row">
            <select id="editTaskPriority">
                <option value="Low">Low Priority</option>
                <option value="Medium">Medium Priority</option>
                <option value="High">High Priority</option>
            </select>
            <input type="text" id="editTaskCategory" placeholder="Category">
        </div>
        
        <div class="modal-row">
            <div style="display:flex; align-items:center; gap:5px;" title="Due Date">
                <span style="font-size:0.8em; color:gray;">Due:</span>
                <input type="datetime-local" id="editTaskDueDate" style="flex:1;">
            </div>
            <div style="display:flex; align-items:center; gap:5px;" title="Optional Reminder Notification">
                <span style="font-size:0.8em; color:gray;">Reminder:</span>
                <input type="datetime-local" id="editTaskReminderDate" style="flex:1;">
            </div>
            <select id="editTaskRecurring">
                <option value="None">No Repeat</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
            </select>
        </div>
        
        <hr style="border-color: var(--border-color); margin: 10px 0;">
        
        <h4>Subtasks</h4>
        <ul id="editSubtaskList" class="subtasks" style="margin-left: 0;"></ul>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="newSubtaskText" placeholder="New Subtask step" style="flex:1;">
            <button id="addSubtaskBtn">Add</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end;">
            <button id="cancelEditBtn">Cancel</button>
            <button id="saveEditBtn" style="background-color: var(--success); color: #fff;">Save Changes</button>
        </div>
    </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
